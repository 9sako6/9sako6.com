<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>9sako6</title>
    <meta
      name="description"
      content="Webアプリケーションの開発をしている9sako6のプロフィールページです。"
    />
    <link rel="canonical" href="https://9sako6.com/" />
    <meta property="og:site_name" content="9sako6" />
    <meta property="og:title" content="9sako6" />
    <meta
      property="og:description"
      content="Webアプリケーションの開発をしている9sako6のプロフィールページです。"
    />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://9sako6.com/" />
    <meta name="twitter:card" content="summary" />
    <link rel="icon" href="/favicon.ico" sizes="any" />
    <link rel="stylesheet" href="/src/styles/site-shell.css" />
    <style>
      body {
        padding: 34px 24px 64px;
      }

      h1 {
        margin: 0;
        font-size: clamp(3.4rem, 14vw, 9rem);
        font-weight: 500;
        line-height: 0.9;
        letter-spacing: 0;
        color: var(--text);
      }

      h2 {
        margin: 0;
        color: var(--accent);
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        font-size: 0.76rem;
        font-weight: 800;
        letter-spacing: 0.16em;
        text-transform: uppercase;
      }

      p {
        margin: 0;
      }

      .lead {
        margin-top: 1.25rem;
        color: var(--muted);
        max-width: 25rem;
        font-size: clamp(1.05rem, 2.6vw, 1.3rem);
        line-height: 1.75;
        overflow-wrap: anywhere;
      }

      nav {
        margin-top: 0;
      }

      ul {
        margin: 1rem 0 0;
        padding: 0;
        list-style: none;
      }

      li + li {
        margin-top: 0.65rem;
      }

      .links li {
        margin-top: 0;
      }

      .links {
        display: flex;
        flex-wrap: wrap;
        gap: 0.55rem;
        margin-top: 0.85rem;
      }

      a {
        color: var(--link);
        text-decoration: underline;
        text-decoration-thickness: 0.08em;
        text-underline-offset: 0.18em;
      }

      a:hover {
        color: var(--accent);
      }

      .profile-issue {
        width: min(100%, 68rem);
        padding-top: 0;
      }

      .issue-bar {
        height: 0.95rem;
        padding: 0;
        border-top: 4px solid var(--line-strong);
        border-bottom: 1px solid var(--line-strong);
      }

      .hero {
        display: grid;
        grid-template-columns: minmax(0, 1.4fr) minmax(15rem, 0.6fr);
        gap: clamp(2rem, 6vw, 5rem);
        align-items: end;
        margin-top: clamp(3rem, 8vw, 6rem);
        padding-bottom: clamp(2rem, 6vw, 4rem);
        border-bottom: 3px double var(--line-strong);
      }

      .deck {
        align-self: stretch;
        display: grid;
        align-content: space-between;
        gap: 2rem;
        padding: 1rem 0 0 1.25rem;
        border-left: 1px solid var(--line-strong);
      }

      .name-reading {
        display: block;
        margin-top: 1rem;
        color: var(--accent);
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        font-size: 0.8rem;
        font-weight: 800;
        letter-spacing: 0.14em;
        text-transform: uppercase;
      }

      .links a {
        display: inline-block;
        padding: 0.22rem 0.5rem;
        border: 1px solid var(--line-strong);
        color: var(--text);
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        font-size: 0.84rem;
        font-weight: 700;
        text-decoration: none;
      }

      .links a:hover {
        border-color: var(--accent);
        color: var(--accent);
      }

      .career {
        display: grid;
        grid-template-columns: 10rem minmax(0, 1fr);
        gap: 1.5rem clamp(2rem, 6vw, 5rem);
        margin-top: clamp(2.5rem, 7vw, 4.5rem);
      }

      .career ul {
        margin-top: 0;
      }

      .career-item {
        display: grid;
        grid-template-columns: 10rem minmax(0, 1fr);
        gap: 1rem;
        padding: 0.75rem 0;
        border-top: 1px solid var(--line);
      }

      .career-item:last-child {
        border-bottom: 1px solid var(--line);
      }

      .period {
        display: block;
        color: var(--muted);
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        font-size: 0.84rem;
      }

      .place {
        display: block;
      }

      @media (max-width: 760px) {
        .issue-bar,
        .hero,
        .career,
        .career-item {
          display: block;
        }

        .issue-bar span {
          display: block;
        }

        .hero {
          margin-top: 2.5rem;
        }

        .deck {
          margin-top: 1.5rem;
          padding-left: 0;
          border-left: 0;
        }

        .career h2 {
          margin-bottom: 1rem;
        }

        .place {
          margin-top: 0.2rem;
        }

        .lead {
          max-width: 18rem;
        }
      }

      @media (max-width: 480px) {
        body {
          padding: 28px 20px 48px;
        }

        h1 {
          font-size: clamp(3rem, 22vw, 5rem);
        }
      }
    </style>
  </head>
  <body>
    <a class="skip-link" href="#main-content">本文へ移動</a>
    <main id="main-content" class="profile-issue">
      <div class="issue-bar" aria-hidden="true"></div>

      <header class="hero">
        <div>
          <h1 id="site-title">9sako6</h1>
          <p class="name-reading">くさころ</p>
        </div>
        <div class="deck">
          <p class="lead">Webアプリケーションの開発をしている9sako6です。</p>
          <nav aria-label="プロフィールリンク">
            <ul class="links">
              <li><a href="/posts/">Blog</a></li>
              <li><a href="https://x.com/9sako6" target="_blank" rel="noopener noreferrer">X</a></li>
              <li><a href="https://github.com/9sako6" target="_blank" rel="noopener noreferrer">GitHub</a></li>
            </ul>
          </nav>
        </div>
      </header>

      <section class="career" aria-labelledby="career-heading">
        <h2 id="career-heading">経歴</h2>
        <ul>
          <li class="career-item">
            <span class="period">2025/06 - 現在</span>
            <span class="place">株式会社ドワンゴ</span>
          </li>
          <li class="career-item">
            <span class="period">2022/11 - 2025/03</span>
            <span class="place">Uzabase, Inc.</span>
          </li>
          <li class="career-item">
            <span class="period">2020/04 - 2022/09</span>
            <span class="place">株式会社永和システムマネジメント</span>
          </li>
        </ul>
      </section>
    </main>
  </body>
</html>
