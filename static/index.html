<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="format-detection" content="telephone=no" />
    <title>9sako6</title>
    <meta
      name="description"
      content="Webアプリケーションの開発をしている9sako6のプロフィールページです。"
    />
    <link rel="canonical" href="https://9sako6.com/" />
    <meta property="og:site_name" content="9sako6" />
    <meta property="og:title" content="9sako6" />
    <meta
      property="og:description"
      content="Webアプリケーションの開発をしている9sako6のプロフィールページです。"
    />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://9sako6.com/" />
    <meta name="twitter:card" content="summary" />
    <link rel="icon" href="/favicon.ico" sizes="any" />
    <style>
      html{background:#070706;color-scheme:dark}body{background:#070706}
    </style>
    <link rel="stylesheet" href="/src/styles/site-shell.css" />
    <style>
      body {
        padding: 34px 24px 64px;
      }

      h1 {
        margin: 0;
        font-family: var(--font-display);
        font-size: clamp(3.9rem, 14vw, 9.8rem);
        font-weight: 500;
        line-height: 0.84;
        letter-spacing: 0;
        color: var(--text);
      }

      h2 {
        margin: 0;
        color: var(--text);
        font-family: var(--font-display);
        font-size: 0.76rem;
        font-weight: 500;
        letter-spacing: 0;
        text-transform: uppercase;
      }

      p {
        margin: 0;
      }

      .lead {
        margin-top: 1.25rem;
        color: var(--muted);
        max-width: 25rem;
        font-size: clamp(1.05rem, 2.6vw, 1.3rem);
        line-height: 1.75;
        overflow-wrap: anywhere;
      }

      nav {
        margin-top: 0;
      }

      ul {
        margin: 1rem 0 0;
        padding: 0;
        list-style: none;
      }

      li + li {
        margin-top: 0.65rem;
      }

      .links li {
        margin-top: 0;
      }

      .links {
        display: flex;
        flex-wrap: wrap;
        gap: 0.55rem;
        margin-top: 0.85rem;
      }

      a {
        color: var(--link);
        text-decoration: underline;
        text-decoration-thickness: 0.08em;
        text-underline-offset: 0.18em;
      }

      a:hover {
        color: var(--link-entry-hover);
      }

      .profile-issue {
        width: min(100%, 68rem);
        padding-top: 0;
      }

      .issue-bar {
        height: 1.15rem;
        padding: 0;
        border-top: 1px solid var(--line-strong);
        border-bottom: 5px double var(--line-strong);
        opacity: 0.92;
      }

      .hero {
        display: grid;
        grid-template-columns: minmax(0, 1.25fr) minmax(17rem, 0.75fr);
        gap: clamp(2rem, 6vw, 5rem);
        align-items: end;
        margin-top: clamp(3rem, 8vw, 6rem);
        padding-bottom: clamp(2rem, 6vw, 4rem);
        border-bottom: 1px solid var(--line-strong);
        position: relative;
      }

      .hero::after {
        content: "";
        position: absolute;
        right: 0;
        bottom: -0.7rem;
        left: 0;
        height: 1px;
        background: var(--line);
      }

      .deck {
        align-self: stretch;
        display: grid;
        align-content: end;
        gap: clamp(2rem, 5vw, 3.5rem);
        padding: 0.5rem 0 0 1.35rem;
        border-left: 1px solid var(--line);
      }

      .deck-copy {
        display: grid;
        gap: 2rem;
      }

      .float-friend {
        justify-self: end;
        position: relative;
        width: min(100%, 18.5rem);
        aspect-ratio: 1;
        filter: drop-shadow(0 1.4rem 2.4rem rgba(0, 0, 0, 0.55));
        opacity: 0.92;
        animation: float-friend 10s ease-in-out infinite;
        will-change: transform;
      }

      .friend-frame {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        object-fit: contain;
        opacity: 0;
        transform: scale(0.99) rotate(-0.4deg);
        animation: friend-frame 15s ease-in-out infinite;
        will-change: opacity, transform;
      }

      .friend-frame:nth-child(2) {
        animation-delay: -10s;
      }

      .friend-frame:nth-child(3) {
        animation-delay: -5s;
      }

      .links a {
        display: inline-block;
        padding: 0.24rem 0.58rem;
        border: 1px solid var(--line);
        color: var(--text);
        background: color-mix(in srgb, var(--paper) 72%, transparent);
        font-family: var(--font-display);
        font-size: 0.98rem;
        font-weight: 500;
        text-decoration: none;
      }

      .links a:hover {
        border-color: var(--line-strong);
        color: var(--link-entry-hover);
        background: transparent;
      }

      .career {
        display: grid;
        grid-template-columns: 10rem minmax(0, 1fr);
        gap: 1.5rem clamp(2rem, 6vw, 5rem);
        margin-top: clamp(3rem, 8vw, 5rem);
      }

      .career ul {
        margin-top: 0;
      }

      .career-item {
        display: grid;
        grid-template-columns: 10rem minmax(0, 1fr);
        gap: 1rem;
        padding: 0.9rem 0;
        border-top: 1px solid var(--line);
      }

      .career-item:last-child {
        border-bottom: 1px solid var(--line);
      }

      .period {
        display: block;
        color: var(--muted);
        font-family: var(--font-display);
        font-size: 0.95rem;
        font-weight: 500;
      }

      .place {
        display: block;
      }

      @media (max-width: 760px) {
        .issue-bar,
        .hero,
        .career,
        .career-item {
          display: block;
        }

        .issue-bar span {
          display: block;
        }

        .hero {
          margin-top: 2.5rem;
        }

        .deck {
          margin-top: 1.5rem;
          padding-left: 0;
          border-left: 0;
        }

        .float-friend {
          width: min(13rem, 58vw);
          margin: 0 0 2.2rem auto;
        }

        .career h2 {
          margin-bottom: 1rem;
          font-size: 1rem;
          letter-spacing: 0;
        }

        .links a {
          padding: 0.36rem 0.7rem;
          font-size: 1rem;
        }

        .period {
          font-size: 1rem;
          line-height: 1.55;
        }

        .place {
          margin-top: 0.2rem;
          font-size: 1.05rem;
          line-height: 1.7;
        }

        .lead {
          max-width: 20rem;
          font-size: 1.12rem;
        }
      }

      @media (max-width: 480px) {
        body {
          padding: 28px 20px 48px;
        }

        h1 {
          font-size: clamp(3rem, 22vw, 5rem);
        }
      }

      @keyframes float-friend {
        0%,
        100% {
          transform: translate3d(0, 0, 0) rotate(-0.8deg);
        }

        33% {
          transform: translate3d(0.28rem, -0.7rem, 0) rotate(1.2deg);
        }

        66% {
          transform: translate3d(-0.24rem, -0.25rem, 0) rotate(-1.4deg);
        }
      }

      @keyframes friend-frame {
        0%,
        26%,
        100% {
          opacity: 1;
          transform: scale(1) rotate(0deg);
        }

        31%,
        95% {
          opacity: 0;
          transform: scale(0.982) rotate(0.8deg);
        }
      }

      @media (prefers-reduced-motion: reduce) {
        .float-friend,
        .friend-frame {
          animation: none;
        }

        .friend-frame {
          opacity: 0;
          transform: none;
        }

        .friend-frame:last-child {
          opacity: 1;
        }
      }
    </style>
  </head>
  <body>
    <a class="skip-link" href="#main-content">本文へ移動</a>
    <main id="main-content" class="profile-issue">
      <div class="issue-bar" aria-hidden="true"></div>

      <header class="hero">
        <div class="brand">
          <h1 id="site-title">9sako6</h1>
        </div>
        <div class="deck">
          <div class="float-friend" aria-hidden="true">
            <img class="friend-frame" src="/assets/ghost-01.png" alt="" width="640" height="640" loading="eager" decoding="async" />
            <img class="friend-frame" src="/assets/ghost-02.png" alt="" width="640" height="640" loading="eager" decoding="async" />
            <img class="friend-frame" src="/assets/ghost-03.png" alt="" width="640" height="640" loading="eager" decoding="async" />
          </div>
          <div class="deck-copy">
            <p class="lead">Webアプリケーションの開発をしている<ruby>9sako6<rt>くさころ</rt></ruby>です。</p>
            <nav aria-label="プロフィールリンク">
              <ul class="links">
                <li><a href="/posts/">Blog</a></li>
                <li><a href="https://x.com/9sako6" target="_blank" rel="noopener noreferrer">X</a></li>
                <li><a href="https://github.com/9sako6" target="_blank" rel="noopener noreferrer">GitHub</a></li>
              </ul>
            </nav>
          </div>
        </div>
      </header>

      <section class="career" aria-labelledby="career-heading">
        <h2 id="career-heading">経歴</h2>
        <ul>
          <li class="career-item">
            <span class="period">2025/06 - 現在</span>
            <span class="place">株式会社ドワンゴ</span>
          </li>
          <li class="career-item">
            <span class="period">2022/11 - 2025/03</span>
            <span class="place">株式会社ユーザベース</span>
          </li>
          <li class="career-item">
            <span class="period">2020/04 - 2022/09</span>
            <span class="place">株式会社永和システムマネジメント</span>
          </li>
        </ul>
      </section>
    </main>
  </body>
</html>
