[tools]
bun = "1.3.11"

[tasks."content:sync"]
description = "Clone or pull the content/blog source repository"
run = """
if [ -d content/blog/.git ]; then
  git -C content/blog pull --ff-only
else
  mkdir -p content
  git clone git@github.com:9sako6/blog.git content/blog
fi
"""

[tasks.generate]
description = "Generate published posts into static HTML"
depends = ["content:sync"]
run = "bun run generate"

[tasks.dev]
description = "Generate the site and serve it locally with Bun"
depends = ["content:sync"]
run = """
BLOG_INCLUDE_DRAFTS=true BLOG_ALLOW_MISSING_IMAGES=true BLOG_OUTPUT_DIR=.dev-dist bun run generate
BLOG_ROOT_DIR=.dev-dist bun run dev
"""
